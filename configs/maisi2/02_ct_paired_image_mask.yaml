# MAISI 2 recipe 02 - CT paired image/mask generation
#
# Generates a synthetic CT plus a paired MAISI segmentation mask using
# NVIDIA's official `rflow-ct` paired pipeline.

ct_structures:
  repo_path: "external/NV-Generate-CTMR"
  model_variant: "rflow-ct"
  network: "rflow"
  output_dir: "outputs/maisi2_ct_paired_chest_lung_tumor"
  gpu_index: 1

  seeds: [31001]
  num_output_samples: 1

  # Fast starter FOV. For higher-quality public figures, use the official CT
  # spacing tables in docs/maisi2_generation_guide.md.
  output_size: [256, 256, 128]
  spacing: [1.5, 1.5, 2.0]

  body_region: ["chest"]
  anatomy_list: ["lung tumor"]
  controllable_anatomy_size: []
  modality: 1
  num_inference_steps: 30
  mask_generation_num_inference_steps: 1000
  cfg_guidance_scale: 0
  autoencoder_sliding_window_infer_size: [48, 48, 48]
  autoencoder_sliding_window_infer_overlap: 0.6666
  download_models: false

ct_visuals:
  output_subdir: "visuals"
  planes: ["axial", "coronal", "sagittal"]
  random_grid: true
  random_slices: 16
  orthogonal_panel: true
  plane_sweeps: true
  overlay_structures: true
  overview_contact_sheet: true

# Run:
#   source MAISI_venv/bin/activate
#   python scripts/run_nvidia_ct_structures_from_config.py --config configs/maisi2/02_ct_paired_image_mask.yaml
